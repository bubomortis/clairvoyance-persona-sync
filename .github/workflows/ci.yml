name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  cross-compile:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build all targets
        run: |
          mkdir -p dist
          for t in windows/amd64 linux/amd64 darwin/amd64 darwin/arm64; do
            os=${t%/*}; arch=${t#*/}
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            GOOS=$os GOARCH=$arch go build -trimpath -o "dist/clvsync-$os-$arch$ext" ./cmd/clvsync
          done
          ls -la dist
      - name: Checksums
        run: cd dist && sha256sum * > SHA256SUMS && cat SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: clvsync-binaries
          path: dist/*

  release:
    # On a version tag, publish the cross-compiled binaries + checksums to the Release (§18).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: cross-compile
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build all targets
        run: |
          mkdir -p dist
          for t in windows/amd64 linux/amd64 darwin/amd64 darwin/arm64; do
            os=${t%/*}; arch=${t#*/}
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            GOOS=$os GOARCH=$arch go build -trimpath -o "dist/clvsync-$os-$arch$ext" ./cmd/clvsync
          done
          cd dist && sha256sum * > SHA256SUMS
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
