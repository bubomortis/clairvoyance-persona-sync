name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.26'
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  cross-compile:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0   # need tags so the version stamp can use git describe
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.26'
      - name: Build all targets
        run: |
          mkdir -p dist
          VER=$(git describe --tags --always)
          LDFLAGS="-X github.com/bubomortis/clairvoyance-persona-sync/internal/version.Version=$VER"
          for t in windows/amd64 linux/amd64 darwin/amd64 darwin/arm64; do
            os=${t%/*}; arch=${t#*/}
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            GOOS=$os GOARCH=$arch go build -trimpath -ldflags "$LDFLAGS" -o "dist/clvsync-$os-$arch$ext" ./cmd/clvsync
          done
          ls -la dist
      - name: Checksums
        run: cd dist && sha256sum * > SHA256SUMS && cat SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: clvsync-binaries
          path: dist/*

  release:
    # On a version tag, publish the cross-compiled binaries + checksums to the Release (§18).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: cross-compile
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0   # tags for the version stamp
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.26'
      - name: Build all targets
        run: |
          mkdir -p dist
          VER=${GITHUB_REF_NAME}   # the tag, e.g. v0.2.0
          LDFLAGS="-X github.com/bubomortis/clairvoyance-persona-sync/internal/version.Version=$VER"
          for t in windows/amd64 linux/amd64 darwin/amd64 darwin/arm64; do
            os=${t%/*}; arch=${t#*/}
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            GOOS=$os GOARCH=$arch go build -trimpath -ldflags "$LDFLAGS" -o "dist/clvsync-$os-$arch$ext" ./cmd/clvsync
          done
          cd dist && sha256sum * > SHA256SUMS
      - name: Publish release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: dist/*
          generate_release_notes: true
